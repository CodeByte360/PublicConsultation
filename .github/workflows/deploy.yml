name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"

  # Allow manual trigger
  workflow_dispatch:

env:
  SERVER_HOST: 192.144.80.202
  APP_DIR: C:\Apps\PublicConsultation
  DOMAIN: staging-terasupport-rdp.arcapps.org

jobs:
  # ==========================================
  # Build & Test
  # ==========================================
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        continue-on-error: true

  # ==========================================
  # Deploy to Windows Server via SSH
  # ==========================================
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (PowerShell)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ env.APP_DIR }}
            git pull origin main
            docker compose build --no-cache blazor-app
            docker compose up -d --force-recreate blazor-app
            timeout /t 15 /nobreak > nul
            docker ps --filter "name=blazor-app" --format "{{.Status}}"
            docker image prune -f

      - name: Verify deployment
        run: |
          sleep 20
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.DOMAIN }} || echo "000")
          echo "Site status: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Site returned HTTP $HTTP_CODE"
          fi
