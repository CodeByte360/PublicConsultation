version: "3.8"

services:
  # ==========================================
  # Blazor Server Application
  # ==========================================
  blazor-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: public-consultation-blazor:latest
    container_name: blazor-app
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - AiServiceUrl=${AI_SERVICE_URL:-http://host.docker.internal:5000}
      - SmtpSettings__Host=${SMTP_HOST:-smtp.gmail.com}
      - SmtpSettings__Port=${SMTP_PORT:-587}
      - SmtpSettings__Username=${SMTP_USERNAME}
      - SmtpSettings__Password=${SMTP_PASSWORD}
      - SmtpSettings__EnableSsl=${SMTP_ENABLE_SSL:-true}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================
  # Portainer CE - Docker Management UI
  # ==========================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
    driver: local
